name: ML CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint check
        run: python -m py_compile main.py

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: needs.linter.result == 'success' &&
        github.ref == 'refs/heads/main' &&
        contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Train model
        run: python train.py

  failure_handler:
    runs-on: ubuntu-latest
    needs: train
    if: failure()

    steps:
      - name: Create error log
        run: echo "Training failed" > error_logs.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt

  cleanup:
    runs-on: ubuntu-latest
    needs: [linter, train]
    if: always()

    steps:
      - name: Cleanup
        run: echo "Cleaning up temporary cloud volumes..."